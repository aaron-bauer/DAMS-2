name: dams_app
description: Disaster Aid Management System (D.A.M.S.) - Integrated Mesh Network
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  nearby_connections: any
  geolocator: ^14.0.2
  flutter_map: ^8.2.2
  latlong2: ^0.9.0
  motion: any
  lucide_icons: any
  provider: ^6.1.1
  intl: ^0.20.2
  path_provider: ^2.1.2
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#000000" # Matches the black background of your logo
  adaptive_icon_foreground: "assets/icon/icon.png"
flutter:
  uses-material-design: true